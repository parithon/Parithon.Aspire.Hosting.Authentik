name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Pack & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to create GitHub Releases
      packages: write   # needed to publish to GitHub Packages
      id-token: write   # needed for GitHub OIDC token issuance for this job

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer needs full history to compute version from tag

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release /p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test tests/Parithon.Aspire.Hosting.Authentik.Tests --no-build --configuration Release

      - name: Pack
        run: |
          dotnet pack src/Parithon.Aspire.Hosting.Authentik.csproj \
            --no-build \
            --configuration Release \
            /p:ContinuousIntegrationBuild=true \
            --output ./nupkg

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./nupkg/*.nupkg

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/parithon/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./nupkg/*.nupkg
          generate_release_notes: true

      - name: Publish to BaGet (nuget.parithon.dev)
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://nuget.parithon.dev/v3/index.json \
            --skip-duplicate
